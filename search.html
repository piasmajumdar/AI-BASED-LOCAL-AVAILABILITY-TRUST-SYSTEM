<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Discovery | Search</title>
    <link rel="shortcut icon" href="./image/LD_logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style/search.css">
</head>

<body>

    <!-- ═══ HEADER ═══ -->
    <header>
        <nav class="header-nav">
            <a href="./index.html" class="logo-text"><span>Local</span> Discovery</a>
            <div class="hdr-search">
                <input type="search" id="searchInput" placeholder="Search for shops, services, or essentials..."
                    value="" />
                <button class="hdr-search-btn" onclick="doSearch()"><i
                        class="fa-solid fa-magnifying-glass-location"></i></button>
            </div>
            <div class="hdr-right">
                <a href="" class="btn-list"><i class="fa-solid fa-shop"></i> List your shop</a>
                <a href="./login.html" class="btn-login">Login</a>
            </div>
        </nav>
    </header>

    <!-- ═══ FILTER BAR ═══ -->
    <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <div class="pill active" onclick="togglePill(this,'open')">🟢 Open Now</div>
        <div class="pill" onclick="togglePill(this,'ai')">✨ AI Recommended</div>
        <div class="pill" onclick="togglePill(this,'nearby')">📍 Under 1 km</div>
        <div class="pill" onclick="togglePill(this,'top')">⭐ Top Rated</div>
        <div class="pill" onclick="togglePill(this,'trusted')">🛡️ High Trust</div>
    </div>

    <!-- ═══ MAIN ═══ -->
    <div class="main-layout">
        <div class="left-panel">
            <div class="panel-header">
                <div class="result-count"><span id="resultCount">0</span> shops near Vijayawada</div>
                <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                    <option value="distance">📍 By Distance</option>
                    <option value="rating">⭐ By Rating</option>
                    <option value="trust">🛡️ By Trust</option>
                </select>
            </div>
            <div class="shop-list" id="shopList"></div>
        </div>
        <div class="right-panel">
            <div id="map"></div>
            <div class="map-fab">
                <div class="map-btn" title="My Location" onclick="goToMyLocation()"><i
                        class="fa-solid fa-location-crosshairs"></i></div>
                <div class="map-btn" title="Zoom In" onclick="map.zoomIn()"><i class="fa-solid fa-plus"></i></div>
                <div class="map-btn" title="Zoom Out" onclick="map.zoomOut()"><i class="fa-solid fa-minus"></i></div>
            </div>
            <div class="map-toast" id="mapToast"></div>
        </div>
    </div>

    <!-- ═══ DETAIL OVERLAY ═══ -->
    <div class="detail-overlay" id="detailOverlay" onclick="closeDetailOutside(event)">
        <div class="detail-panel" id="detailPanel">
            <div class="detail-close" onclick="closeDetail()"><i class="fa-solid fa-xmark"></i></div>
            <div class="detail-tabs">
                <button class="tab-btn active" data-tab="overview"><i class="fa-solid fa-store"></i> Overview</button>
                <button class="tab-btn" data-tab="products"><i class="fa-solid fa-box-open"></i> Products</button>
                <button class="tab-btn" data-tab="photos"><i class="fa-solid fa-images"></i> Photos</button>
                <button class="tab-btn" data-tab="reviews"><i class="fa-solid fa-star"></i> Reviews</button>
            </div>
            <div class="detail-body">
                <div class="detail-left" id="detailLeft"></div>
                <div class="detail-right" id="detailRight"></div>
            </div>
        </div>
    </div>

    <!-- ═══ LIGHTBOX ═══ -->
    <div class="lightbox" id="lightbox" onclick="lbOutside(event)">
        <button class="lb-close" onclick="closeLB()"><i class="fa-solid fa-xmark"></i></button>
        <button class="lb-nav lb-prev" onclick="lbNav(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <img id="lbImg" src="" alt="" />
        <button class="lb-nav lb-next" onclick="lbNav(1)"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="lb-counter" id="lbCounter"></div>
    </div>



    <script src="./js/search.js"></script>
</body>

</html>
